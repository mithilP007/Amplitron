name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in Amplitron
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix the issue efficiently!

  - type: checkboxes
    id: checks
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting.
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true
        - label: I am using the latest version of Amplitron (if possible).
          required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we trigger this bug? Please walk us through it step-by-step.
      placeholder: |
        1. Launch Amplitron
        2. Add effect '...'
        3. Set parameter '...' to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the application is affected?
      options:
        - Audio Engine / DSP Pipeline
        - GUI / Pedal Board
        - Specific Effect (describe below)
        - Preset Manager
        - Spectrum Analyzer
        - Recorder
        - Tuner
        - Undo/Redo
        - Other
    validations:
      required: true

  - type: input
    id: effect
    attributes:
      label: Effect Name (if applicable)
      description: If the bug is in a specific effect, name it here.
      placeholder: e.g. Reverb, WahPedal

  - type: markdown
    attributes:
      value: |
        ### 💻 Environment & Audio Setup
        *Please provide your hardware and OS details. This is crucial for audio debugging.*

  - type: input
    id: amplitron_version
    attributes:
      label: Amplitron Version
      description: Specify the version of Amplitron you are using.
      placeholder: e.g. v1.0.2, main-branch-latest
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 14.x, Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: audio_interface
    attributes:
      label: Audio Interface
      placeholder: e.g. Focusrite Scarlett 2i2, Universal Audio Apollo
    validations:
      required: true

  - type: input
    id: sample_rate
    attributes:
      label: Sample Rate & Buffer Size
      placeholder: e.g. 48000 Hz, 128 samples
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant terminal output or error messages.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or audio recordings that help illustrate the problem.
