name: Feature Request
description: Suggest a new feature or improvement for Amplitron
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Amplitron?? Then describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve, or what use case does it enable?
      placeholder: e.g. "I want to be able to reorder effects by drag-and-drop instead of using buttons."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application does this feature relate to?
      options:
        - Audio Engine / DSP Pipeline
        - GUI / Pedal Board
        - New DSP Effect (use the DSP Effect Request template instead)
        - Preset Manager
        - Spectrum Analyzer
        - Recorder
        - Tuner
        - Undo/Redo
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches or workarounds you've considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references that help illustrate the feature.
